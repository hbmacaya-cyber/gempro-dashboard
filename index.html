<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GEMPRO Farma — Paciente</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;--b1:rgba(0,0,0,0.12);--b2:rgba(0,0,0,0.22);--r1:8px;--r2:12px}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#242422;--t1:#e8e7e2;--t2:#a8a7a2;--t3:#6e6d69;--b1:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.2)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--t1);min-height:100vh;padding:2rem}
.wrap{max-width:900px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:18px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;background:#639922;display:inline-block;margin-right:6px}
.sub{font-size:13px;color:var(--t2);margin-top:2px}
.hdr-btns{display:flex;gap:8px;align-items:center}
.btn{font-size:13px;padding:6px 14px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);border-radius:var(--r1);cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{background:var(--bg2)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--bg2);border-radius:var(--r1);padding:14px 16px}
.ml{font-size:12px;color:var(--t2);margin-bottom:6px}
.mv{font-size:22px;font-weight:500}
.srow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem}
.srow input{flex:1;min-width:160px;max-width:280px;padding:8px 12px;font-size:14px;border:0.5px solid var(--b2);border-radius:var(--r1);background:var(--bg1);color:var(--t1)}
.srow input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.pcrd{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);padding:1rem 1.25rem;margin-bottom:1rem}
.phdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av{width:44px;height:44px;border-radius:50%;background:#B5D4F4;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#0C447C;flex-shrink:0}
.pn{font-size:16px;font-weight:500}.pd{font-size:13px;color:var(--t2)}
.psts{display:flex;gap:16px;flex-wrap:wrap;border-top:0.5px solid var(--b1);padding-top:12px}
.ps{font-size:13px;color:var(--t2)}.ps strong{color:var(--t1);font-weight:500}
.stit{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.ri{border:0.5px solid var(--b1);border-radius:var(--r1);overflow:hidden;margin-bottom:8px}
.rh{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);cursor:pointer;flex-wrap:wrap}
.rid{font-size:13px;font-weight:500;flex:1;min-width:0}.rd{font-size:12px;color:var(--t2)}
.bdg{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.ok{background:#EAF3DE;color:#3B6D11}.pnd{background:#FAEEDA;color:#854F0B}.dsp{background:#E6F1FB;color:#185FA5}
.rb{padding:12px 14px;display:none;border-top:0.5px solid var(--b1)}.rb.open{display:block}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.dl{font-size:11px;color:var(--t2);margin-bottom:2px}.dv{font-size:13px;font-weight:500}
.mdr{font-size:12px;color:var(--t2);margin-bottom:10px}.mdr strong{color:var(--t1)}
.obsv{font-size:12px;color:var(--t2);margin-top:4px;font-style:italic}
.ps2{margin-top:10px;border-top:0.5px solid var(--b1);padding-top:10px}
.pt{font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.ptbl{width:100%;border-collapse:collapse;font-size:12px}
.ptbl th{text-align:left;padding:5px 8px;color:var(--t2);border-bottom:0.5px solid var(--b1);font-weight:500}
.ptbl td{padding:5px 8px;border-bottom:0.5px solid var(--b1)}
.ptbl tr:last-child td{border-bottom:none}
.cp{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--bg3);color:var(--t2)}
.cv{font-size:11px;transition:transform .2s;display:inline-block;color:var(--t3)}.cv.open{transform:rotate(90deg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--b1);border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--r1);padding:1rem;font-size:13px;color:#501313;margin-bottom:1rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1><span class="dot"></span>GEMPRO Farma — HIG</h1>
      <p class="sub">Consulta por paciente</p>
    </div>
    <div class="hdr-btns">
      <a href="menu.html" class="btn">&#8962; Menú</a><a href="general.html" class="btn">&#9998; Análisis general</a>
      <button class="btn" id="btnActualizar">&#8635; Actualizar</button>
    </div>
  </div>
  <div id="errArea"></div>
  <div class="metrics">
    <div class="metric"><div class="ml">Total recetas</div><div class="mv" id="mTotal">—</div></div>
    <div class="metric"><div class="ml">Pacientes</div><div class="mv" id="mPac">—</div></div>
    <div class="metric"><div class="ml">Medicamentos únicos</div><div class="mv" id="mMeds">—</div></div>
    <div class="metric"><div class="ml">Retiradas</div><div class="mv" id="mRet">—</div></div>
  </div>
  <div class="srow">
    <input type="text" id="dniInput" placeholder="Buscar por DNI..." maxlength="12"/>
    <button class="btn" id="btnBuscar">Buscar</button>
    <button class="btn" id="btnLimpiar" style="border:none">Limpiar</button>
  </div>
  <div id="resultArea"><div class="empty"><span class="spin"></span>Cargando datos...</div></div>
</div>
<script>
var API = 'https://script.google.com/macros/s/AKfycby82hqDwxOAjTziWcH5XwhsFgbFISa-d5ZdlH-D0gFjBTRunpI0TAq-zjqPL7hy1PflfA/exec';
var REC = [], PRD = [], BY_RECETA = {}, pendiente = 0;

function jsonp(url, cb) {
  var name = '_cb' + Date.now() + Math.floor(Math.random()*10000);
  window[name] = function(data) {
    delete window[name];
    document.getElementById(name) && document.getElementById(name).remove();
    cb(null, data);
  };
  var s = document.createElement('script');
  s.id = name;
  s.onerror = function() {
    delete window[name];
    s.remove();
    cb(new Error('No se pudo cargar: ' + url));
  };
  s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + name + '&t=' + Date.now();
  document.head.appendChild(s);
}

function cargarDatos() {
  REC = []; PRD = []; BY_RECETA = {}; pendiente = 2;
  document.getElementById('errArea').innerHTML = '';
  document.getElementById('resultArea').innerHTML = '<div class="empty"><span class="spin"></span>Cargando datos...</div>';
  ['mTotal','mPac','mMeds','mRet'].forEach(function(id){ document.getElementById(id).textContent = '—'; });

  jsonp(API + '?sheet=Recetas', function(err, data) {
    if (err) { mostrarError(err.message); return; }
    REC = data;
    pendiente--;
    if (pendiente === 0) procesarDatos();
  });

  jsonp(API + '?sheet=RecetasProductos', function(err, data) {
    if (err) { mostrarError(err.message); return; }
    PRD = data;
    pendiente--;
    if (pendiente === 0) procesarDatos();
  });
}

function mostrarError(msg) {
  document.getElementById('errArea').innerHTML = '<div class="errbox">Error al cargar: ' + msg + '</div>';
  document.getElementById('resultArea').innerHTML = '<div class="empty">No se pudieron cargar los datos.</div>';
}

function procesarDatos() {
  BY_RECETA = {};
  PRD.forEach(function(p) {
    var id = String(p['ID Receta']||'').trim();
    if (!BY_RECETA[id]) BY_RECETA[id] = [];
    BY_RECETA[id].push(p);
  });
  var dnis = {}, meds = {}, ret = 0;
  REC.forEach(function(r) {
    dnis[r['DNI']] = 1;
    if (String(r['Fecha Retiro x Paciente']||'').trim()) ret++;
  });
  PRD.forEach(function(p){ if (p['Producto']) meds[p['Producto']] = 1; });
  document.getElementById('mTotal').textContent = REC.length;
  document.getElementById('mPac').textContent   = Object.keys(dnis).length;
  document.getElementById('mMeds').textContent  = Object.keys(meds).length;
  document.getElementById('mRet').textContent   = ret;
  document.getElementById('resultArea').innerHTML = '<div class="empty">Ingresá un DNI para consultar el historial</div>';
}

function fd(v) {
  if (!v) return '—';
  v = String(v).trim();
  if (!v) return '—';
  var d = new Date(v);
  return isNaN(d.getTime()) ? v : d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function getSt(r) {
  if (String(r['Fecha Retiro x Paciente']||'').trim())  return {l:'Retirado',   c:'ok'};
  if (String(r['Fecha Producto Disponible']||'').trim()) return {l:'Disponible', c:'dsp'};
  if (String(r['Fecha Inicio Gestión']||'').trim())      return {l:'En gestión', c:'pnd'};
  return {l:'Recibida', c:'pnd'};
}

function iniciales(r) {
  return ((r['Apellidos']||'').charAt(0)+(r['Nombres']||'').charAt(0)).toUpperCase()||'??';
}

function tog(idx) {
  var rb = document.getElementById('rb'+idx);
  var cv = document.getElementById('cv'+idx);
  if (rb) rb.classList.toggle('open');
  if (cv) cv.classList.toggle('open');
}

function buscar(dni) {
  if (pendiente > 0) { setTimeout(function(){ buscar(dni); }, 300); return; }
  var dniStr = String(dni).trim();
  var recetas = REC.filter(function(r){ return String(r['DNI']).trim() === dniStr; });
  var area = document.getElementById('resultArea');
  if (!recetas.length) { area.innerHTML = '<div class="empty">No se encontró paciente con DNI ' + dniStr + '</div>'; return; }

  var p0 = recetas[0];
  var conRet = recetas.filter(function(r){ return String(r['Fecha Retiro x Paciente']||'').trim(); }).length;
  var MO = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  function mo(s){ var p=String(s||'').toLowerCase().split(' '); return (parseInt(p[1])||0)*12+MO.indexOf(p[0]); }
  var mesesMap = {};
  recetas.forEach(function(r){ if(r['Mes-Año']) mesesMap[r['Mes-Año']]=1; });
  var meses = Object.keys(mesesMap).sort(function(a,b){ return mo(a)-mo(b); });
  var tMeds = {};
  recetas.forEach(function(r){
    (BY_RECETA[(r['ID Receta']||'').trim()]||[]).forEach(function(p){ if(p['Producto']) tMeds[p['Producto']]=1; });
  });

  var container = document.createElement('div');

  var pcrd = document.createElement('div'); pcrd.className = 'pcrd';
  pcrd.innerHTML = '<div class="phdr"><div class="av">'+iniciales(p0)+'</div>'
    +'<div><div class="pn">'+(p0['Apellidos']||'')+', '+(p0['Nombres']||'')+'</div>'
    +'<div class="pd">DNI: '+dniStr+'</div></div></div>'
    +'<div class="psts">'
    +'<div class="ps">Recetas: <strong>'+recetas.length+'</strong></div>'
    +'<div class="ps">Retiradas: <strong>'+conRet+'</strong></div>'
    +'<div class="ps">Medicamentos: <strong>'+Object.keys(tMeds).length+'</strong></div>'
    +'<div class="ps">Período: <strong>'+(meses.length?meses[0]+(meses.length>1?' → '+meses[meses.length-1]:''):'—')+'</strong></div>'
    +'</div>';
  container.appendChild(pcrd);

  var tit = document.createElement('div'); tit.className = 'stit';
  tit.textContent = 'Historial de recetas ('+recetas.length+')';
  container.appendChild(tit);

  recetas.forEach(function(r, i) {
    var s = getSt(r);
    var ri = document.createElement('div'); ri.className = 'ri';

    var rh = document.createElement('div'); rh.className = 'rh';
    var cv  = document.createElement('span'); cv.className='cv';  cv.id='cv'+i;  cv.innerHTML='&#9658;';
    var rid = document.createElement('span'); rid.className='rid'; rid.textContent=r['ID Receta']||'';
    var rd  = document.createElement('span'); rd.className='rd';   rd.textContent=fd(r['Fecha Recepción']);
    var bdg = document.createElement('span'); bdg.className='bdg '+s.c; bdg.textContent=s.l;
    rh.appendChild(cv); rh.appendChild(rid); rh.appendChild(rd); rh.appendChild(bdg);
    rh.addEventListener('click', (function(n){ return function(){ tog(n); }; })(i));

    var rb = document.createElement('div'); rb.className='rb'; rb.id='rb'+i;
    var dg = document.createElement('div'); dg.className='dg';
    [['Recepción','Fecha Recepción'],['Inicio gestión','Fecha Inicio Gestión'],
     ['Disponible','Fecha Producto Disponible'],['Retiro','Fecha Retiro x Paciente']
    ].forEach(function(f){
      var d = document.createElement('div');
      d.innerHTML='<div class="dl">'+f[0]+'</div><div class="dv">'+fd(r[f[1]])+'</div>';
      dg.appendChild(d);
    });
    rb.appendChild(dg);

    if (r['Médico']&&r['Médico'].trim()) {
      var mdr=document.createElement('div'); mdr.className='mdr';
      mdr.innerHTML='Médico: <strong>'+r['Médico']+'</strong>'; rb.appendChild(mdr);
    }
    if (r['Observaciones']&&r['Observaciones'].trim()) {
      var obs=document.createElement('div'); obs.className='obsv';
      obs.textContent=r['Observaciones']; rb.appendChild(obs);
    }

    var prods = BY_RECETA[(r['ID Receta']||'').trim()]||[];
    if (prods.length) {
      var ps2=document.createElement('div'); ps2.className='ps2';
      var pt=document.createElement('div'); pt.className='pt';
      pt.textContent='Medicamentos ('+prods.length+')'; ps2.appendChild(pt);
      var tbl=document.createElement('table'); tbl.className='ptbl';
      tbl.innerHTML='<thead><tr><th>Producto</th><th>Categoría</th><th style="text-align:center">Cant.</th><th>Origen</th></tr></thead>';
      var tbody=document.createElement('tbody');
      prods.forEach(function(p){
        var tr=document.createElement('tr');
        tr.innerHTML='<td>'+(p['Producto']||'—')+'</td>'
          +'<td><span class="cp">'+(p['Categoría']||'—')+'</span></td>'
          +'<td style="text-align:center">'+(p['Cantidad Prescripta']||'—')+'</td>'
          +'<td style="color:var(--t2)">'+(p['Origen Producto']||'—')+'</td>';
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody); ps2.appendChild(tbl); rb.appendChild(ps2);
    }
    ri.appendChild(rh); ri.appendChild(rb); container.appendChild(ri);
  });

  area.innerHTML = ''; area.appendChild(container);
}

document.getElementById('btnBuscar').addEventListener('click', function(){
  var v=document.getElementById('dniInput').value.trim(); if(v) buscar(v);
});
document.getElementById('dniInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ var v=e.target.value.trim(); if(v) buscar(v); }
});
document.getElementById('btnLimpiar').addEventListener('click', function(){
  document.getElementById('dniInput').value='';
  document.getElementById('resultArea').innerHTML='<div class="empty">Ingresá un DNI para consultar el historial</div>';
});
document.getElementById('btnActualizar').addEventListener('click', cargarDatos);
cargarDatos();
</script>
</body>
</html>
