<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GEMPRO Farma — Paciente</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;--b1:rgba(0,0,0,0.12);--b2:rgba(0,0,0,0.22);--r1:8px;--r2:12px}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#242422;--t1:#e8e7e2;--t2:#a8a7a2;--t3:#6e6d69;--b1:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.2)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--t1);min-height:100vh;padding:2rem}
.wrap{max-width:900px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:18px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;background:#639922;display:inline-block;margin-right:6px}
.sub{font-size:13px;color:var(--t2);margin-top:2px}
.btn{font-size:13px;padding:6px 14px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);border-radius:var(--r1);cursor:pointer;text-decoration:none;display:inline-block}
.btn:hover{background:var(--bg2)}
.hdr-btns{display:flex;gap:8px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--bg2);border-radius:var(--r1);padding:14px 16px}
.ml{font-size:12px;color:var(--t2);margin-bottom:6px}
.mv{font-size:22px;font-weight:500}
.srow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem}
.srow input{flex:1;min-width:160px;max-width:280px;padding:8px 12px;font-size:14px;border:0.5px solid var(--b2);border-radius:var(--r1);background:var(--bg1);color:var(--t1)}
.srow input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.pcrd{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);padding:1rem 1.25rem;margin-bottom:1rem}
.phdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av{width:44px;height:44px;border-radius:50%;background:#B5D4F4;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#0C447C;flex-shrink:0}
.pn{font-size:16px;font-weight:500}
.pd{font-size:13px;color:var(--t2)}
.psts{display:flex;gap:16px;flex-wrap:wrap;border-top:0.5px solid var(--b1);padding-top:12px}
.ps{font-size:13px;color:var(--t2)}
.ps strong{color:var(--t1);font-weight:500}
.stit{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.ri{border:0.5px solid var(--b1);border-radius:var(--r1);overflow:hidden;margin-bottom:8px}
.rh{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);cursor:pointer;flex-wrap:wrap}
.rid{font-size:13px;font-weight:500;flex:1;min-width:0}
.rd{font-size:12px;color:var(--t2)}
.bdg{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.ok{background:#EAF3DE;color:#3B6D11}
.pnd{background:#FAEEDA;color:#854F0B}
.dsp{background:#E6F1FB;color:#185FA5}
.rb{padding:12px 14px;display:none;border-top:0.5px solid var(--b1)}
.rb.open{display:block}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.dl{font-size:11px;color:var(--t2);margin-bottom:2px}
.dv{font-size:13px;font-weight:500}
.mdr{font-size:12px;color:var(--t2);margin-bottom:10px}
.mdr strong{color:var(--t1)}
.obsv{font-size:12px;color:var(--t2);margin-top:4px;font-style:italic}
.ps2{margin-top:10px;border-top:0.5px solid var(--b1);padding-top:10px}
.pt{font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.ptbl{width:100%;border-collapse:collapse;font-size:12px}
.ptbl th{text-align:left;padding:5px 8px;color:var(--t2);border-bottom:0.5px solid var(--b1);font-weight:500}
.ptbl td{padding:5px 8px;border-bottom:0.5px solid var(--b1)}
.ptbl tr:last-child td{border-bottom:none}
.cp{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500;background:var(--bg3);color:var(--t2)}
.cv{font-size:11px;transition:transform .2s;display:inline-block;color:var(--t3)}
.cv.open{transform:rotate(90deg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--b1);border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1><span class="dot"></span>GEMPRO Farma — HIG</h1>
      <p class="sub">Consulta por paciente</p>
    </div>
    <div class="hdr-btns">
      <a href="general.html" class="btn">&#9998; Análisis general</a>
      <button class="btn" id="recargarBtn">&#8635; Actualizar</button>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="ml">Total recetas</div><div class="mv" id="mTotal">—</div></div>
    <div class="metric"><div class="ml">Pacientes</div><div class="mv" id="mPac">—</div></div>
    <div class="metric"><div class="ml">Medicamentos únicos</div><div class="mv" id="mMeds">—</div></div>
    <div class="metric"><div class="ml">Retiradas</div><div class="mv" id="mRet">—</div></div>
  </div>
  <div class="srow">
    <input type="text" id="dniInput" placeholder="Buscar por DNI..." maxlength="12"/>
    <button class="btn" id="searchBtn">Buscar</button>
    <button class="btn" id="clearBtn" style="border:none">Limpiar</button>
  </div>
  <div id="resultArea"><div class="empty"><span class="spin"></span>Cargando datos...</div></div>
</div>
<script>
var URL_R='https://docs.google.com/spreadsheets/d/e/2PACX-1vTtspEWMBzvbRVDJnaqhIFoBdgFvkvx80i9BlenpBIn94b6DyBYwVLlssqFShYebv9BBfdE4ajL50Yk/pub?gid=0&single=true&output=csv';
var URL_P='https://docs.google.com/spreadsheets/d/e/2PACX-1vTtspEWMBzvbRVDJnaqhIFoBdgFvkvx80i9BlenpBIn94b6DyBYwVLlssqFShYebv9BBfdE4ajL50Yk/pub?gid=1031286687&single=true&output=csv';
var REC=[],PRD=[],byReceta={},loaded=false;

function cargarDatos(){
  loaded=false;
  document.getElementById('resultArea').innerHTML='<div class="empty"><span class="spin"></span>Cargando datos...</div>';
  document.getElementById('mTotal').textContent='—';
  document.getElementById('mPac').textContent='—';
  document.getElementById('mMeds').textContent='—';
  document.getElementById('mRet').textContent='—';
  Promise.all([fetch(URL_R),fetch(URL_P)])
    .then(function(rs){return Promise.all(rs.map(function(r){return r.text();}));})
    .then(function(ts){
      REC=Papa.parse(ts[0],{header:true,skipEmptyLines:true}).data.filter(function(r){return String(r['DNI']||'').trim();});
      PRD=Papa.parse(ts[1],{header:true,skipEmptyLines:true}).data.filter(function(r){return String(r['ID Receta']||'').trim();});
      byReceta={};
      PRD.forEach(function(p){
        var id=String(p['ID Receta']||'').trim();
        if(!byReceta[id])byReceta[id]=[];
        byReceta[id].push(p);
      });
      loaded=true;
      var dnis=new Set(REC.map(function(r){return r['DNI'];}));
      var meds=new Set();PRD.forEach(function(p){if(p['Producto'])meds.add(p['Producto']);});
      var ret=REC.filter(function(r){return String(r['Fecha Retiro x Paciente']||'').trim();}).length;
      document.getElementById('mTotal').textContent=REC.length;
      document.getElementById('mPac').textContent=dnis.size;
      document.getElementById('mMeds').textContent=meds.size;
      document.getElementById('mRet').textContent=ret;
      document.getElementById('resultArea').innerHTML='<div class="empty">Ingresá un DNI para consultar el historial</div>';
    })
    .catch(function(e){
      document.getElementById('resultArea').innerHTML='<div class="empty">Error al cargar datos: '+e.message+'</div>';
    });
}

function fd(v){
  if(v===null||v===undefined)return '—';
  v=String(v).trim();
  if(!v||v==='NaN')return '—';
  var d=new Date(v);if(isNaN(d))return v;
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function getSt(r){
  var ret=String(r['Fecha Retiro x Paciente']||'').trim();
  var dis=String(r['Fecha Producto Disponible']||'').trim();
  var ini=String(r['Fecha Inicio Gestión']||'').trim();
  if(ret)return {l:'Retirado',c:'ok'};
  if(dis)return {l:'Disponible',c:'dsp'};
  if(ini)return {l:'En gestión',c:'pnd'};
  return {l:'Recibida',c:'pnd'};
}

function inis(r){return((r['Apellidos']||'').charAt(0)+(r['Nombres']||'').charAt(0)).toUpperCase()||'?';}

function buildProds(idRec){
  var prods=byReceta[String(idRec||'').trim()]||[];
  if(!prods.length)return '';
  var rows='';
  prods.forEach(function(p){
    rows+='<tr><td>'+(p['Producto']||'—')+'</td><td><span class="cp">'+(p['Categoría']||'—')+'</span></td>'
      +'<td style="text-align:center">'+(p['Cantidad Prescripta']||'—')+'</td>'
      +'<td style="color:var(--t2)">'+(p['Origen Producto']||'—')+'</td></tr>';
  });
  return '<div class="ps2"><div class="pt">Medicamentos ('+prods.length+')</div>'
    +'<table class="ptbl"><thead><tr><th>Producto</th><th>Categoría</th><th style="text-align:center">Cant.</th><th>Origen</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function tog(idx){
  document.getElementById('rb'+idx).classList.toggle('open');
  document.getElementById('cv'+idx).classList.toggle('open');
}

function buscar(dni){
  if(!loaded){setTimeout(function(){buscar(dni);},500);return;}
  var dniStr=String(dni).trim();
  var recetas=REC.filter(function(r){return String(r['DNI']).trim()===dniStr;});
  var area=document.getElementById('resultArea');
  if(!recetas.length){area.innerHTML='<div class="empty">No se encontró paciente con DNI '+dniStr+'</div>';return;}
  var p0=recetas[0];
  var conRet=recetas.filter(function(r){return String(r['Fecha Retiro x Paciente']||'').trim();}).length;
  var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  function mo(s){var p=String(s).toLowerCase().split(' ');return(parseInt(p[1])||0)*12+MONTHS.indexOf(p[0]);}
  var meses=[];
  recetas.forEach(function(r){var m=r['Mes-Año'];if(m&&meses.indexOf(m)<0)meses.push(m);});
  meses.sort(function(a,b){return mo(a)-mo(b);});
  var tMeds=new Set();
  recetas.forEach(function(r){(byReceta[String(r['ID Receta']||'').trim()]||[]).forEach(function(p){if(p['Producto'])tMeds.add(p['Producto']);});});

  var html='<div class="pcrd"><div class="phdr"><div class="av">'+inis(p0)+'</div>'
    +'<div><div class="pn">'+(p0['Apellidos']||'')+', '+(p0['Nombres']||'')+'</div>'
    +'<div class="pd">DNI: '+dniStr+'</div></div></div>'
    +'<div class="psts">'
    +'<div class="ps">Recetas: <strong>'+recetas.length+'</strong></div>'
    +'<div class="ps">Retiradas: <strong>'+conRet+'</strong></div>'
    +'<div class="ps">Medicamentos: <strong>'+tMeds.size+'</strong></div>'
    +'<div class="ps">Período: <strong>'+(meses.length?meses[0]+(meses.length>1?' → '+meses[meses.length-1]:''):'—')+'</strong></div>'
    +'</div></div>'
    +'<div class="stit">Historial de recetas ('+recetas.length+')</div>';

  recetas.forEach(function(r,i){
    var s=getSt(r);
    html+='<div class="ri">'
      +'<div class="rh" data-i="'+i+'" onclick="tog(parseInt(this.dataset.i))">'
      +'<span class="cv" id="cv'+i+'">&#9658;</span>'
      +'<span class="rid">'+String(r['ID Receta']||'')+'</span>'
      +'<span class="rd">'+fd(r['Fecha Recepción'])+'</span>'
      +'<span class="bdg '+s.c+'">'+s.l+'</span>'
      +'</div>'
      +'<div class="rb" id="rb'+i+'">'
      +'<div class="dg">'
      +'<div><div class="dl">Recepción</div><div class="dv">'+fd(r['Fecha Recepción'])+'</div></div>'
      +'<div><div class="dl">Inicio gestión</div><div class="dv">'+fd(r['Fecha Inicio Gestión'])+'</div></div>'
      +'<div><div class="dl">Disponible</div><div class="dv">'+fd(r['Fecha Producto Disponible'])+'</div></div>'
      +'<div><div class="dl">Retiro</div><div class="dv">'+fd(r['Fecha Retiro x Paciente'])+'</div></div>'
      +'</div>'
      +(r['Médico']?'<div class="mdr">Médico: <strong>'+r['Médico']+'</strong></div>':'')
      +(r['Observaciones']?'<div class="obsv">'+r['Observaciones']+'</div>':'')
      +buildProds(r['ID Receta'])
      +'</div></div>';
  });

  area.innerHTML=html;
}

document.getElementById('searchBtn').addEventListener('click',function(){var v=document.getElementById('dniInput').value.trim();if(v)buscar(v);});
document.getElementById('dniInput').addEventListener('keydown',function(e){if(e.key==='Enter'){var v=e.target.value.trim();if(v)buscar(v);}});
document.getElementById('clearBtn').addEventListener('click',function(){document.getElementById('dniInput').value='';document.getElementById('resultArea').innerHTML='<div class="empty">Ingresá un DNI para consultar el historial</div>';});
document.getElementById('recargarBtn').addEventListener('click',cargarDatos);

cargarDatos();
</script>
</body>
</html>
